
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStock - Inicio de Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>CineStock</h1>
        <p>Escuela de Artes Audiovisuales "Lumière"</p>
    </header>

    <main>
        <section class="login-box">
            <h2>Iniciar Sesión</h2>
            <form action="pages/alumno.html" method="GET">
                <div class="form-group">
                    <label for="usuario">Matrícula / Usuario:</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingrese su matrícula" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
            
            <nav class="demo-nav">
                <p><strong>Accesos directos de prueba:</strong></p>
                <ul>
                    <li><a href="pages/alumno.html">Vista Alumno</a></li>
                    <li><a href="pages/panolero.html">Vista Pañolero</a></li>
                    <li><a href="pages/director.html">Vista Director</a></li>
                </ul>
            </nav>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CineStock - Grupo 4. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
